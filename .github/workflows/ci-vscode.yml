name: CI (VSCode extension)

on:
  push:
    branches: [main]
    paths: ["editors/vscode/**"]
  pull_request:
    paths: ["editors/vscode/**"]
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The extension shells out to the `dat_linter` binary itself (it does not bundle it —
      # see editors/vscode/README.md), so its integration tests need a built binary on PATH.
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Build dat_linter
        run: cargo build --release
      - name: Add dat_linter to PATH
        run: echo "${{ github.workspace }}/target/release" >> "$GITHUB_PATH"
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: editors/vscode/package-lock.json
      # Regenerates syntaxes/simutrans-dat.tmLanguage.json from `dat_linter keys --format json`
      # and fails if the committed file has drifted from what dat_linter currently reports.
      - name: Generate grammar and check it's up to date
        working-directory: editors/vscode
        run: |
          node scripts/generate-grammar.mjs
          git diff --exit-code -- syntaxes/simutrans-dat.tmLanguage.json
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci
      # @vscode/test-electron downloads a full VSCode build (~290MB) on every
      # run unless cached -- see editors/vscode/README.md's dev notes. The
      # cache key isn't tied to a specific VSCode version (none is pinned in
      # .vscode-test.mjs, so it always resolves "stable"); @vscode/test-cli
      # itself detects a version mismatch against a stale cache and
      # re-downloads as needed, so a stale hit only costs a wasted restore,
      # never a wrong/broken install.
      - name: Cache VSCode test download
        uses: actions/cache@v6
        with:
          path: editors/vscode/.vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('editors/vscode/package-lock.json') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-
      - name: Compile
        working-directory: editors/vscode
        run: npm run compile
      - name: Test
        working-directory: editors/vscode
        run: xvfb-run -a npm test
      - name: Lint snippets against dat_linter
        working-directory: editors/vscode
        run: npm run test:snippets
      - name: Grammar snapshot test
        working-directory: editors/vscode
        run: npm run test:grammar
